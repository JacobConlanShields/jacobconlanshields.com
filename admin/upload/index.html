<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Upload — Jacob Shields</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main id="admin-upload-page">
    <p class="nav"><a href="/">← Back to home</a><span class="dot">•</span><a href="/admin">Admin</a></p>
    <h1>Admin Upload</h1>
    <p class="small-note">This route is protected by Cloudflare Access. Add image files and upload to the selected destination.</p>

    <div class="small-note" id="limit-banner">Max upload per request: 100 MB (HTTP 413 if exceeded).</div>

    <div class="upload-meta upload-controls">
      <label>Destination Root
        <select id="destination-root">
          <option value="photography">photography</option>
          <option value="spincline">spincline</option>
        </select>
      </label>

      <label id="spincline-section-wrap" hidden>Spincline Section
        <select id="spincline-section">
          <option value="design-and-build">design-and-build</option>
          <option value="finished-products">finished-products</option>
          <option value="in-action">in-action</option>
        </select>
      </label>

      <label>Add Files
        <input id="files" type="file" accept="image/*" multiple />
      </label>

    </div>

    <div id="drop-target" class="drop-target" aria-live="polite">
      <p class="small-note">Drag photos here, or use the file picker above.</p>
    </div>

    <div id="drop-overlay" class="drop-overlay" hidden>
      <p class="drop-overlay-text">Drop files to add</p>
    </div>

    <div class="small-note" id="batch-status">No files queued.</div>

    <div id="queue" class="admin-grid"></div>

    <div class="upload-actions-bottom">
      <button id="upload-all" type="button">Upload all</button>
    </div>
  </main>

  <script type="module" src="/assets/admin-upload.js"></script>
</body>
</html>
