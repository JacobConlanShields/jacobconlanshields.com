<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Upload — Jacob Shields</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main>
    <p class="nav"><a href="/">← Back to home</a><span class="dot">•</span><a href="/admin">Admin</a></p>
    <h1>Admin Upload</h1>
    <p class="small-note">Upload one file at a time with destination-aware metadata.</p>

    <div class="upload-meta upload-controls">
      <label>Destination Root
        <select id="root" aria-label="Destination root">
          <option value="photography">photography</option>
          <option value="spincline">spincline</option>
        </select>
      </label>
      <label id="section-wrap" hidden>Section
        <select id="section" aria-label="Spincline section">
          <option value="design-and-build">design-and-build</option>
          <option value="finished-products">finished-products</option>
          <option value="in-action">in-action</option>
        </select>
      </label>
      <input id="files" type="file" multiple accept="image/*,video/*" />
    </div>

    <div class="small-note upload-limit-banner" id="upload-limit">Max upload per request: -- MB (HTTP 413 if exceeded).</div>
    <div class="small-note" id="batch-status">No files selected yet.</div>

    <div class="admin-grid" id="queue"></div>
  </main>

  <script type="module" src="/assets/admin-upload.js"></script>
</body>
</html>
