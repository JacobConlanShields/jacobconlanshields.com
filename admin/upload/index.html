<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Upload — Jacob Shields</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main>
    <p class="nav"><a href="/">← Back to home</a><span class="dot">•</span><a href="/admin">Admin</a></p>
    <h1>Admin Upload</h1>
    <p class="small-note">Protected by Cloudflare Access.</p>

    <div class="upload-meta upload-controls">
      <label>Destination Root
        <select id="root">
          <option value="photography">photography</option>
          <option value="spincline">spincline</option>
        </select>
      </label>
      <label id="section-wrap" hidden>Spincline Section
        <select id="section">
          <option value="design-and-build">design-and-build</option>
          <option value="finished-products">finished-products</option>
          <option value="in-action">in-action</option>
        </select>
      </label>
      <label>Choose files
        <input id="files" type="file" accept="image/*,video/*" multiple />
      </label>
    </div>

    <div id="limit-banner" class="upload-limit-banner">Max upload per request: 100 MB (HTTP 413 if exceeded).</div>
    <div id="batch-status" class="small-note">No files selected yet.</div>

    <div id="queue" class="admin-grid"></div>
  </main>

  <script type="module" src="/assets/admin-upload.js"></script>
</body>
</html>
