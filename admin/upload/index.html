<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Upload — Jacob Shields</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <main>
    <p class="nav"><a href="/">← Back to home</a><span class="dot">•</span><a href="/admin">Admin</a></p>
    <h1>Admin Upload</h1>
    <p class="small-note">This route is protected by Cloudflare Access.</p>

    <p id="upload-limit-banner" class="small-note">Max upload per request: 100 MB (HTTP 413 if exceeded).</p>

    <div class="upload-meta upload-controls">
      <label>Destination Root
        <select id="destination-root">
          <option value="photography">photography</option>
          <option value="spincline">spincline</option>
        </select>
      </label>

      <label id="section-label" hidden>Spincline Section
        <select id="spincline-section">
          <option value="design-and-build">design-and-build</option>
          <option value="finished-products">finished-products</option>
          <option value="in-action">in-action</option>
        </select>
      </label>

      <label>Select images
        <input id="files" type="file" multiple accept="image/*" />
      </label>

      <button id="upload-all" type="button">Upload all</button>
    </div>

    <p id="queue-status" class="small-note">No files queued.</p>
    <div id="drop-overlay" class="upload-drop-overlay" hidden>Drop files to add</div>
    <div id="queue" class="admin-grid"></div>
  </main>

  <script type="module" src="/assets/admin-upload.js"></script>
</body>
</html>
